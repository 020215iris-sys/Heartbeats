# docker-compose.yml
# 역할: 하트비트의 컨테이너들을 한 번에 정의·실행
# 사용: docker compose up -d
#
# 3-DB 구조:
#   db_general   (포트 5432) — 일상 운영 데이터 (회원, 세션, 보호자 동의)
#   db_sensitive (포트 5433) — 정신건강 임상 데이터 (진단, 상담, 위기)
#   db_audit     (포트 5434) — 감사 추적 로그 (INSERT only 원칙)

networks:
  heartbeat_net:
    driver: bridge

volumes:
  db_general_data:
  db_sensitive_data:
  db_audit_data:

services:
  # ===========================================
  # 일반 DB: 회원/세션/보호자 동의 등 운영 데이터
  # ===========================================
  db_general:
    image: pgvector/pgvector:pg16
    container_name: heartbeat_db_general
    restart: unless-stopped
    environment:
      POSTGRES_USER: heartbeat
      POSTGRES_PASSWORD: ${DB_GENERAL_PASSWORD}
      POSTGRES_DB: heartbeat_general
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - db_general_data:/var/lib/postgresql/data
      - ./db/general/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heartbeat -d heartbeat_general"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - heartbeat_net

  # ===========================================
  # 민감 DB: 진단/상담/위기 등 임상 데이터
  # 벡터 검색 지원 (pgvector) — AI 임베딩용
  # ===========================================
  db_sensitive:
    image: pgvector/pgvector:pg16
    container_name: heartbeat_db_sensitive
    restart: unless-stopped
    environment:
      POSTGRES_USER: heartbeat
      POSTGRES_PASSWORD: ${DB_SENSITIVE_PASSWORD}
      POSTGRES_DB: heartbeat_sensitive
      TZ: Asia/Seoul
    ports:
      - "5433:5432"
    volumes:
      - db_sensitive_data:/var/lib/postgresql/data
      - ./db/sensitive/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heartbeat -d heartbeat_sensitive"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - heartbeat_net

  # ===========================================
  # 감사 DB: 모든 접근/변경 기록 (분리 보관)
  # INSERT only 원칙으로 audit trail 변조 방지
  # ===========================================
  db_audit:
    image: postgres:16-alpine
    container_name: heartbeat_db_audit
    restart: unless-stopped
    environment:
      POSTGRES_USER: heartbeat
      POSTGRES_PASSWORD: ${DB_AUDIT_PASSWORD}
      POSTGRES_DB: heartbeat_audit
      TZ: Asia/Seoul
      DB_AUDIT_WRITER_PASSWORD: ${DB_AUDIT_WRITER_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - db_audit_data:/var/lib/postgresql/data
      - ./db/audit/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heartbeat -d heartbeat_audit"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - heartbeat_net

  # ===========================================
  # Redis: Celery 브로커 + 세션/OTP 임시 저장
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: heartbeat_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - heartbeat_net

#  FastAPI 백엔드는 컨테이너
  api:
    build: ./backend
    container_name: heartbeat_api
    restart: unless-stopped          
    env_file:                        
      - ./backend/.env             
    ports:
      - "8000:8000"
    depends_on:
      db_general:
        condition: service_healthy
      db_sensitive:                  #
        condition: service_healthy
      db_audit:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - heartbeat_net
    command: uvicorn backend_main:app --host 0.0.0.0 --port 8000  
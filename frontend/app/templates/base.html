<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}하트비트{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#f0f9ff", 100: "#e0f2fe",
                500: "#3b82f6", 600: "#2563eb", 700: "#1d4ed8",
              },
            },
          },
        },
      };
    </script>
  </head>

  <body class="min-h-screen bg-slate-50 text-slate-900 antialiased">
    <header class="border-b border-slate-200 bg-white">
      <div class="mx-auto flex h-14 max-w-5xl items-center justify-between px-4">
        <a href="{{ url_for('main.landing') }}" class="font-semibold">
          ❤ 하트비트
        </a>
        <nav class="flex items-center gap-4 text-sm text-slate-600">
          <a href="{{ url_for('auth.login') }}" class="hover:text-slate-900">로그인</a>
        </nav>
      </div>
    </header>

    {# flash 메시지 표시 영역 (다른 페이지에서 띄운 알림이 여기 뜸) #}
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mx-auto max-w-3xl px-4 pt-4 space-y-2">
          {% for category, msg in messages %}
            <div class="rounded-md border px-4 py-2 text-sm
                        {% if category == 'error' %}bg-red-50 border-red-200 text-red-800
                        {% else %}bg-blue-50 border-blue-200 text-blue-800{% endif %}">
              {{ msg }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <main>{% block content %}{% endblock %}</main>
  </body>
</html>

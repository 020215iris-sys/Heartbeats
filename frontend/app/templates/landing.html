{% extends "base.html" %}

{% block title %}하트비트 · 익명 AI 감정 케어{% endblock %}

{% block content %}
<section class="mx-auto max-w-3xl px-4 py-20 text-center">
  <h1 class="text-4xl font-bold tracking-tight">혼자 끌어안지 않아도 돼요</h1>
  <p class="mt-4 text-lg text-slate-600">
    익명으로 시작하는 AI 감정 케어, 하트비트
  </p>
  <div class="mt-8 flex justify-center gap-3">
    <a href="{{ url_for('auth.signup') }}"
       class="rounded-lg bg-brand-600 px-5 py-2.5 text-white hover:bg-brand-700">
      시작하기
    </a>
    <a href="{{ url_for('auth.login') }}"
       class="rounded-lg border border-slate-300 bg-white px-5 py-2.5 hover:bg-slate-50">
      로그인
    </a>
  </div>
</section>
{% endblock %}

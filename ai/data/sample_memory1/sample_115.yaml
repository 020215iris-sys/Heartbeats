main_complaint:
병원 방문이 연속적으로 휴가여서 헛걸음했다.
core_topics:
- IMF 시절의 경험
- 직장 변화와 경력
- 수술과 직장 퇴사
- 부족함과 준비에 대한 생각
- 시골 생활과 직장 문제
next_session_notes:
내담자의 직장 경험과 그로 인한 감정, 현재 상황에 대한 심층적인 논의 필요.
prompt_adjustment:
- 내담자의 과거 경험에 대한 구체적인 질문
- 현재의 직장 상황에 대한 감정 탐색
- 부족함과 준비에 대한 내담자의 생각을 더 깊이 이해하기
important_memory:
- IMF 시절에 직장이 정리되었던 경험
- 6년간 근무한 직장에서 예고 없이 퇴사 통보를 받음
- 수술을 결심하게 된 이유와 과정
- 시골로 이사 후 직장 구하기 어려움
- 학점 은행을 통해 자격증 취득
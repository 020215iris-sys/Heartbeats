main_complaint:
이성관계에서의 혼란과 몰입으로 인해 학업을 포기하는 극단적 행동 패턴 반복

core_topics:
- 이성관계혼란
- 학업포기패턴
- 흑백사고
- 인정욕구

next_session_notes:
이성관계 몰입과 학업 포기 행동의 연결 과정 및 흑백사고 패턴 탐색 필요

prompt_adjustment:
- emotion_validation
- cognitive_reframing
- behavioral_activation

important_memory:
- 원하는 대학 진학을 목표로 여러 차례 수능에 도전하였으며, 장기간 입시 준비 과정에서 큰 좌절감과 패배감을 경험함.
- 입시 준비 시기 무렵 정신건강의학과 상담을 약 2개월간 받았으며, 당시 생각 정리와 정서적 어려움 해소에 도움을 받음.
- 대학 입학을 포기하고 취업을 고려하던 시기에 부모, 교회 관계자, 지인의 권유를 통해 현재 학교에 진학하게 됨.
- 가족 구성은 부모와 남동생이며, 부모와의 관계는 전반적으로 안정적이고 지지적인 편이라고 인식함.
- 사람들과 교류하고 대화하는 것을 중요하게 여기며, 장기간 입시 준비 기간에도 기존 친구들과의 관계를 지속적으로 유지함.
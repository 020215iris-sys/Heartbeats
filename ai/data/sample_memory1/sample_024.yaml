main_complaint:
타인의 시선과 평가에 대한 불안과 자기비난 지속

core_topics:
- 대인불안
- 자기비난
- 관계긴장
- 인정욕구

next_session_notes:
타인 평가 민감성과 자기표현 억압의 연결 탐색 필요

prompt_adjustment:
- emotional_awareness
- self_validation
- cognitive_reframing

important_memory:
- 성경 관련 불안이 이전 10점 대비 현재 4~5점 수준으로 완화되었으나 완전히 해소되지는 않은 상태임.
- 타인의 비판 시 무가치감을 느끼는 패턴과 자기 존재에 대한 확신 부족이 핵심 과제로 확인됨. 특히 '존재적 무시'에 대한 민감성이 두드러짐.
- 아이들과의 소통 부족에 대한 미안함과 아버지 역할에 대한 아쉬움이 감정적으로 올라옴.
- 과제로 성도, 아내, 자녀에게 자신의 성격·외모·능력에 대한 긍정적 피드백을 받아오는 작업이 부여됨.
- 자신이 좋아하는 것(탕수육, 족발, 삼겹살, 하늘색, 스위스·유럽 여행, 가르치기·설교)을 탐색하는 자기 이해 작업을 시작했으며, 다음 회기에서 과제 점검 예정임.
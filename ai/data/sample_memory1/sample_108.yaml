main_complaint:
시험과 관련된 불안감 및 일과 자녀에 대한 스트레스
core_topics:
- 시험 불안
- 자녀 양육
- 일에 대한 완벽주의
- 정서적 스트레스
next_session_notes:
내담자의 불안 요소와 일상생활에서의 스트레스 관리 방안 논의 필요
prompt_adjustment:
- 시험에 대한 불안감 조절 방법
- 일과 가정의 균형 맞추기
important_memory:
- 내담자는 최근 친인척 모임과 가족 모임에 참석했다.
- 내담자는 강아지를 키우고 있으며, 남편에게 강아지를 잘 보라고 말했다.
- 내담자는 시험을 경험 삼아 보았고, 상담을 진행하고 있다.
- 내담자는 자녀와의 저녁 식사를 하고 싶지만 일이 바쁠 때는 외식하거나 배달 음식을 시켜 먹는다.
- 내담자는 일에 대한 완벽주의가 있으며, 일과 관련된 스트레스가 크다.
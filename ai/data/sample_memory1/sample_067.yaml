main_complaint:
장애 자녀 돌봄 부담과 완벽주의로 인한 만성 불안 지속

core_topics:
- 돌봄부담
- 완벽주의
- 강박경향
- 미래불안

next_session_notes:
완벽주의와 돌봄 책임감이 불안을 강화하는 구조 탐색 필요

prompt_adjustment:
- caregiver_burden
- anxiety_regulation
- cognitive_reframing

important_memory:
검사 결과 우울보다 불안이 약 2배 높게 나와, 다음 회기부터 불안 관련 매뉴얼로 상담을 진행하기로 했다.
규칙·루틴에서 벗어나 찝찝함이 올라올 때 이를 알아차리고 "괜찮아, 그럴 수도 있어"라고 스스로에게 말해 주는 훈련을 해 보기로 했다.
평소 관심 있던 심리·철학 분야 학부 과정을 공부 중이며, 2학기에 21학점을 신청해 두었으나 상담사 권유를 받아들여 수강 과목을 줄이기로 했다.
둘째 아들(장애가 있는 @NAME)과 관련된 상황에서만 완벽주의·강박 반응이 극심해지고, 그 아이가 없을 때는 거의 나타나지 않는다는 점을 스스로 확인했다.
과거 둘째 육아의 한계로 물건을 던지고 욕을 하던 시기에 스스로 상담소를 찾아 약 6개월 상담을 받았고, 던지는 행동이 크게 개선되었다.
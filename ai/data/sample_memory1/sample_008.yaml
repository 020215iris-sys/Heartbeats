session_id: 03

main_complaint:
타인의 시선과 요구에 얽매여 살아간다는 압박감과 자기비난을 지속적으로 경험하며, 신체적 한계와 무능감에 대한 불안을 느끼고 있음.

core_topics:
- 자기비난
- 무능감
- 스트레스
- 가족갈등
- 신체불안
- 자기효능감
- 감정억압

next_session_notes:
“나는 예민해서 문제다”라는 자기 해석이 어떻게 형성되었는지 추가 탐색 필요
재활과 회복 경험을 단순 생존이 아닌 성취 경험으로 인식할 수 있는지 이어서 확인 예정.

prompt_adjustment:
- self_validation
- emotional_expression
- cognitive_reframing
- self_compassion

important_memory:
- 4년 반 전 아버지와의 극심한 갈등 이후 전정기관 손상으로 쓰러져 약 2년간 누워 지냈으며, 현재 전정기능이 40~50% 수준으로 회복된 상태로 계단 보행 시 손을 잡아야 하고 눈을 감으면 쓰러지는 증상이 지속되고 있음.
- 5년간의 경력 단절 후 복직하였으며, 예상과 달리 동료들의 도움과 환영을 받아 직장 적응에 어려움이 없었다고 밝힘.
- 복직과 대학원(학교) 병행에 대한 부담을 느끼고 있으며, 체력 및 신체 기능의 한계로 인해 무능하다는 생각이 지속되고 있음.
- 아버지 사망 전 감정을 표현한 것에 대해 자책해왔으나, 1년 반간의 상담 등의 활동을 통해 아버지 사망이 자신의 책임이 아님을 받아들이게 됨.
- 다음 회기까지 '예민함이 고정된 성격적 특성인지, 아니면 당시 상황으로 인한 일시적 상태였는지'를 스스로 생각해오기로 함.
important_memory:
- 잠들기 전 핸드폰 사용을 줄이고 새벽 1시 이전 취침을 목표로 하고 있음
- 쉬는 날에는 핸드폰 사용 시간이 증가하는 경향이 있음
- 웹테크 설문조사 활동을 자주 하고 있음
- 자전거 타기를 취미로 언급함
- 도서관에 가서 종이책을 읽어보고 싶다고 이야기함
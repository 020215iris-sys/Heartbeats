important_memory:
- 결혼 약 30년 차이며, 남편이 지속적으로 음주 후 연락 두절 상태가 반복되고 있으며, 최근에도 음주 후 연락이 안 되는 사건이 있었음.
- 남편이 음주운전으로 면허가 2년 취소된 상태임.
- 유방암 재발 후 치료를 받았으며, 현재 항호르몬제 복용 중이고 5년 완치 판정을 약 1년 앞두고 있음.
- 약 2년 반 전부터 불안 관련 안정제를 복용 중이며, 현재는 약을 바꾸어 복용 중이고 상태가 많이 호전된 상태임.
- 친정 가족 중 오빠, 남동생, 여동생이 각각 간질환 및 암으로 사망하였으며, 이른 나이에 부모님도 여의었음.
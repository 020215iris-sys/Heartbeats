main_complaint:
과도한 책임감과 눈치보기로 인해 지속적인 불안과 정서적 소진 경험

core_topics:
- 눈치보기
- 관계불안
- 결핍감
- 자기확신부족

next_session_notes:
어린 시절 결핍 경험과 현재의 과도한 책임감 연결 구조 탐색 필요

prompt_adjustment:
- anxiety_support
- emotional_validation
- self_worth_support

important_memory:
- 내담자는 부모를 일찍 여의고 외할머니, 이모, 큰삼촌 등 네 곳의 가정을 전전하며 성장하였으며, 중학교 시절 극심한 눈치와 외로움으로 수면제 및 방습제를 복용하는 자살 시도를 두 차례 경험하였다. 현재는 그 시절에 대한 원망은 없다고 하며, 성인이 된 후 부모에 대한 이해가 생겼다고 한다.
- 큰애 초등학교 시절 다닌 영업회사에서 스폰서의 격려와 질책을 통해 성격이 긍정적으로 변화하는 전환점을 경험하였으며, 이를 처음으로 내 편 같은 관계로 표현하였다.
- 자신의 어린 시절 이야기를 오늘 상담에서 처음으로 꺼냈으며, 자녀와 남편도 이 사실을 모르고 있다.
- 주말 TV 과시청 대신 집 청소, 강아지 산책, 아들과 영화 보기를 즐거운 활동 목록으로 선택하였으며, 다음 회기에 실천 여부를 점검하기로 하였다.
- 50세 이후에는 일을 한 가지로 줄이고 캠핑 등 하고 싶은 활동을 하겠다는 구체적인 목표가 있다.
main_complaint:
아버지 사고 이후 형성된 미신적 사고와 위험에 대한 경계심, 공정성과 질서가 훼손되는 상황에서 경험하는 분노 반응을 탐색함

core_topics:
- 아버지사고
- 트라우마
- 미신적사고
- 위험인식
- 공정성가치

next_session_notes:
트라우마 경험 이후 형성된 통제 욕구와 위험 인식이 현재 감정 반응 및 행동에 미치는 영향을 추가 탐색 필요

prompt_adjustment:
- cognitive_reframing
- values_exploration
- emotion_regulation

important_memory:
- 2년 전 아버지가 집에서 넘어져 크게 다친 사고를 경험했으며 당시 현장을 정리하며 아버지의 피를 직접 닦은 경험이 있음
- 아버지 사고 이후 작은 변화가 큰 불행으로 이어질 수 있다는 미신적 사고와 징크스가 일부 형성됨
- 사고 당시 집에 없었던 자신이 현장에 있었더라면 결과가 달라졌을지 반복적으로 생각한 경험이 있음
- 스토아 철학의 영향을 받아 바꿀 수 없는 일은 받아들이고 현재 할 수 있는 일에 최선을 다해야 한다는 가치관을 중요하게 여김
- 질서와 공정성, 정직함을 중요한 가치로 여기며 규칙을 어기는 행동에 강한 분노를 느끼는 경향이 있음
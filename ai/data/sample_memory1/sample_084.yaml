main_complaint:
낯가림과 새로운 대인관계 형성의 어려움을 줄이고 처음 만난 사람과 자연스럽게 소통하는 능력을 키우고 싶음

core_topics:
- 대인관계
- 낯가림
- 거절경험
- 상담진로

next_session_notes:
거절 경험이 현재 대인관계 회피와 긴장에 미치는 영향 및 처음 만난 사람과의 상호작용에서 나타나는 자동적 사고 탐색 필요

prompt_adjustment:
- social_anxiety
- interpersonal_skills
- self_confidence

important_memory:
- 고등학교 시절 대인관계 문제로 위클래스 상담을 받았으며 해당 경험이 상담심리 전공 선택에 영향을 줌.
- 현재 상담심리를 공부하고 있으며 미래에 상담사로 활동하고 싶지만 자신의 역량에 대한 고민도 함께 가지고 있음.
- 약 1년 전 새로운 인간관계를 넓히기 위해 여러 사람에게 먼저 다가갔으나 일부로부터 부담스럽다는 반응을 받은 뒤 대인관계에 더욱 조심스러워짐.
- 부모와 남동생이 있는 가정에서 성장했으며 가족과의 관계는 전반적으로 원만한 편임.
- 학업과 함께 아르바이트를 병행하고 있으며 고등학교 시절부터 이어진 소수의 친한 친구 관계를 현재까지 유지하고 있음.
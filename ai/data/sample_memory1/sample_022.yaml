important_memory:
- 기관 운영 주체가 교체되었으며, 새로운 담당자로부터 아직 아무런 연락이나 공문이 없는 상황으로 기관 존속 여부에 대한 불확실성이 지속되고 있음.
- 어린 시절 외로움과 우울감이 깊었으며, 이를 현재 구성원들과의 연결과 대화로 해소하고 있다는 자기 이해에 도달함.
- 직원들에게 자발적 중간 보고를 요청하는 문화를 만들고자 하며, 급여 체계에 대해 구성원들과 허심탄회하게 대화할 계획을 갖고 있음
- 교회 사역을 약 7년간 전임으로 수행한 경험이 있으며, 현재 교육 관련 기관을 운영하며 다수의 교사와 아동을 관리하고 있음.
- 사람들과 마음을 나누고 연결감을 형성하는 것을 삶의 중요한 가치로 여김.
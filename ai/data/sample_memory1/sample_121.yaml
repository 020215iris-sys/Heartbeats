main_complaint:
불안과 강박적인 생각
core_topics:
- 완벽주의
- 불안
- 인간관계
- 합리화
- 신앙
next_session_notes:
내담자가 느끼는 불안의 원인과 강박적인 행동에 대한 구체적인 사례를 다루기.
prompt_adjustment:
- 내담자의 불안과 강박적인 행동에 대한 구체적인 사례를 더 깊이 탐구하기
- 완벽주의가 내담자에게 미치는 영향에 대해 논의하기
important_memory:
- 내담자는 상담을 통해 긍정적인 에너지를 느끼고 있다.
- 내담자는 불안이 강박 속에서 이루어지는 것이라고 설명했다.
- 내담자는 일상에서의 작은 일에도 큰 불안을 느낀다고 말했다.
- 내담자는 남에게 폐를 끼치는 것을 매우 싫어한다고 언급했다.
- 내담자는 내년에 재계약 시 원장에게 자신의 불안을 전달할 계획이라고 했다.
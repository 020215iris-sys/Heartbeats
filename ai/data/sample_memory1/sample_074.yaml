main_complaint:
유튜브 시청을 통해 스트레스와 무기력을 해소하려 하지만 사용 시간이 길어지고 자신의 정체성과 삶의 방향에 대한 고민이 지속됨

core_topics:
- 유튜브사용
- 스트레스대처
- 자기정체성탐색
- 우울경험
- 대체활동탐색

next_session_notes:
교회 참석 실천 여부와 산책 등 대체활동 경험 및 자기이해 탐색 과정의 변화 확인 필요

prompt_adjustment:
- identity_exploration
- behavioral_activation
- cognitive_reframing

important_memory:
- 발달장애가 있는 아들을 오랫동안 양육해 왔으며 앞으로도 지속적인 돌봄이 필요하다고 인식함.
- 코로나 이후 교회 출석을 중단했으며 다시 교회에 나가볼 계획을 세움.
- 작년에 심한 우울과 무기력을 경험하며 집에 머무르고 사람들과의 연락을 피한 시기가 있었음.
- 우울했던 시기에 남편의 권유와 지지로 외부 활동을 늘리며 상태가 호전되었다고 이야기함.
- 현재 자신의 취향과 정체성을 다시 찾고 싶다는 고민을 반복적으로 표현함.
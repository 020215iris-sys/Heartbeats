- 과거 범죄수사 및 법의학 관련 분야에 관심이 있었으나 진로로 이어지지는 못함.
- 장기 입원 환자의 회복 과정을 지켜보는 것에서 현재 직업의 의미를 느끼고 있음.
- 반려묘 두 마리를 약 7년째 키우고 있으며 정서적 안정과 위안을 얻고 있음.
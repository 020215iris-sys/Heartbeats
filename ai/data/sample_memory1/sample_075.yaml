main_complaint:
미디어 사용 시간이 하루 7시간 이상으로 증가한 상태이며 외로움과 우울감, 답답함을 해소하기 위해 반복적으로 미디어에 의존하고 있음

core_topics:
- 미디어의존
- 외로움
- 유능감욕구
- 직업만족과한계
- 자기계발욕구

next_session_notes:
유능감과 만족감을 높일 수 있는 활동 5가지 탐색 결과와 실제 시도 경험 및 미디어 사용 변화 확인 필요

prompt_adjustment:
- self_efficacy_building
- values_exploration
- behavioral_activation

important_memory:
- 학교에서 학생 생활지도를 담당하며 13년 이상 같은 직장에서 근무하고 있음.
- 형과 함께 살고 있으나 각자 생활하여 대화가 적고 외로움을 느끼고 있음.
- 어릴 때 형에게 폭언과 폭행을 당한 경험이 있으며 욕설에 민감하게 반응함.
- 과거 교사 임용 준비와 다양한 자격증 취득을 위해 지속적으로 공부해 왔음.
- 학생들과의 관계에서 보람을 느끼며 실제로 사직을 고민했을 때 학생들의 지지로 직장을 계속 다니기로 결정한 경험이 있음.
important_memory:
- 중학교 시절 지역 내 문제 학교에 진학하여 또래 및 일부 교사와 지속적인 갈등을 경험했고 결국 전학을 감.
- 중학교 시절 교사로부터 부당한 징계와 체벌을 경험했으며 학부모가 학교에 방문할 정도로 갈등이 커진 적이 있음.
- 당시 극심한 스트레스로 원형탈모가 발생했으며 현재까지 흔적이 남아 있음
- 약 1년간 사설 상담센터에서 지속적으로 상담을 받은 경험이 있음.
- 대학 입학 후 건강한 인간관계와 지지적 환경을 경험하며 이전보다 대인관계에 대한 안정감을 얻음.


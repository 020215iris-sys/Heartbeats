important_memory:
- 어린 시절부터 부모의 반복적인 부부갈등과 경제적 문제를 경험했으며, 부모의 빚을 대신 갚기 위해 어린 나이부터 아르바이트를 하고 장기간 빚을 상환함.
- 부모의 지속적인 갈등으로 청소년기에 집을 나와 혼자 생활하며 아르바이트와 검정고시를 통해 학업을 이어감.
- 아버지와는 10년 이상 연락을 끊은 상태이며, 현재는 어머니와 가까운 거리에 거주하며 돌봄과 지원을 이어가고 있음.
- 어머니는 분노 시 폭언·물건 파손·위협적 행동을 보였으며, 최근에도 집기와 안전장비를 파손하는 사건이 발생함.
- 결혼 10년 차로 남편과 자녀의 지지를 받고 있으며, 현재 대학에서 상담 관련 전공을 공부하고 있음.
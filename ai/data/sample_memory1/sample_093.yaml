important_memory:
- 지난해 심한 우울과 자살사고를 경험했으며 수업을 중도 포기해 F 학점을 받은 적이 있음.
- 현재 재수강 중인 과목을 회피하지 않고 다시 도전하며 학업을 이어가고 있음.
- 운동을 꾸준히 이어오고 있으며 수술 이후에도 다시 시작해 지속하고 있음.
- 부모님 지원으로 생활비를 받으며 스스로 예산을 관리하고 적금을 유지하고 있음.
- 다른 사람에게 피해를 주고 싶지 않은 마음이 강하며 이를 중요한 행동 기준으로 삼고 있음.
main_complaint:
과도한 책임감과 자기억압으로 인한 정서적 피로 지속

core_topics:
- 책임감
- 자기억압
- 타인기준
- 신념구조

next_session_notes:
타인 기준과 자기규범이 정서적 피로와 자기억압으로 이어지는 과정 탐색 필요

prompt_adjustment:
- schema_exploration
- self_identity_support
- emotional_awareness

important_memory:
- 현재 상담사로 활동 중이며, 실습 인연으로 연결된 두 분을 스승으로 여기고 있음.
- 사고를 당한 이후에도 책임감으로 5일간의 상담 프로그램에 약을 복용하며 참여한 경험이 있으며, 이를 통해 책임감이 강점이자 자기 몸을 돌보지 않는 단점으로 작용할 수 있음을 인식하고 있음.
- 만성 피로가 있으며 스트레스를 받으면 식사를 잘 하지 않는 패턴이 있음.
- 어머니가 누나와 비교하며 경제적 성취를 압박하는 경향이 있고, 내담자는 이를 예상되는 스트레스 요인으로 인식하고 있음.
- 결혼을 일찍 하고 싶다는 바람과, 상담 전문가가 되려면 10년 이상이 필요하다는 말을 들은 것이 겹치면서 초조함을 경험한 바 있으며, 현재는 이 초조함이 다소 사그라진 상태임.
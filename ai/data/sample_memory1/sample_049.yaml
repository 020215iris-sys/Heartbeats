main_complaint:
진로 방향을 구체화하기 위해 대학원 진학 정보를 탐색하고 반복되는 소외감 경험의 영향을 이해하고자 함

core_topics:
- 진로탐색
- 대학원진학
- 소외감
- 대인관계
- 과거경험

next_session_notes:
 대학원 진학 방향과 특수대학원 탐색 결과를 확인하고 과거 소외감 경험이 현재 대인관계에 미치는 영향을 추가 탐색 필요

prompt_adjustment:
 - career_exploration
 - interpersonal_pattern_exploration
 - emotion_awareness

important_memory:
- 상담 관련 전공을 살려 진로를 이어가고자 하며 대학원 진학을 고민하고 있음.
- 교육대학원 진학은 상담교사 진로에 대한 확신 부족으로 제외하는 방향으로 생각하게 됨.
- 대학원은 반드시 특정 교수 연구실에 들어가야 한다고 생각했으나 이번 상담을 통해 특수대학원 진학 가능성을 새롭게 알게 됨.
- 중학교 시기부터 친구 관계에서 소외감을 경험한 일이 반복적으로 있었음.
- 학부 과정에서 친구들과의 조별활동 및 수업 경험 중 소외감을 크게 느낀 경험이 있음.
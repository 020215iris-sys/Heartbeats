main_complaint:
남자친구와의 관계에서 불안함을 느끼고 있다.
core_topics:
- 관계의 불안
- 감정 표현
- 상대방의 변화
- 자신의 감정 관리
next_session_notes:
내담자가 느끼는 불안의 원인과 감정 표현에 대해 더 깊이 탐구할 필요가 있다.
prompt_adjustment:
- 상대방의 감정 변화에 대한 내담자의 반응
- 불안감을 느끼는 상황에 대한 구체적인 사례
- 자신의 감정을 어떻게 관리할 것인지에 대한 계획
important_memory:
- 내담자는 남자친구와의 관계가 두 달 되었음을 언급했다.
- 내담자는 남자친구와의 통화에서 불안감을 느꼈고, 눈물이 났다고 말했다.
- 내담자는 남자친구와의 통화 중 서로의 감정 표현에 대해 논의했다.
- 내담자는 남자친구와의 관계에서 감정 소비와 현타를 느끼고 있다고 말했다.
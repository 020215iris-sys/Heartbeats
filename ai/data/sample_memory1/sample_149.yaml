main_complaint:
남편의 건강 문제와 관련된 스트레스
core_topics:
- 남편의 게실염
- 입원 및 퇴원 과정
- 부부 간의 소통
- 친구 및 가족과의 관계
- 자녀 양육의 어려움
- 과거의 불안장애 경험
next_session_notes:
남편의 건강 상태와 내담자의 스트레스 관리 방안 논의
prompt_adjustment:
- 남편의 건강 문제에 대한 내담자의 감정과 반응 탐색
- 부부 간의 소통 방식 개선 방안 모색
important_memory:
- 남편이 게실염으로 입원 후 퇴원 예정
- 내담자는 남편의 건강 문제로 스트레스를 받고 있음
- 내담자는 친정엄마와 신앙적인 부분에 대해 이야기함
- 내담자는 친구들과의 관계가 멀어졌지만 소통이 중요하다고 느낌
- 내담자는 자녀 양육에 대한 부담을 느끼고 있음
- 내담자는 과거 유치원에서의 불안장애 경험이 있음
main_complaint:
암 투병 이후 가족 부담과 정서적 피로 지속

core_topics:
- 암투병
- 가족부담
- 경제스트레스
- 부모돌봄

next_session_notes:
가족 역할 부담과 죄책감 구조 탐색 필요

prompt_adjustment:
- caregiver_burden
- emotional_validation
- stress_processing

important_memory:
- 자궁 관련 희귀암을 진단받았으며 수술 후 재발하여 재수술과 항암치료 6회를 받았고 현재도 추적 관찰 중임.
- 어린 시절 부모의 잦은 부부갈등과 아버지의 음주, 어머니의 방임 속에서 성장했으며 경제적으로 불안정한 환경을 경험함.
- 성인이 된 후에도 어머니의 반복적인 다단계·사기·투자 실패로 본인과 동생이 큰 빚을 부담했고 신용불량 상태까지 경험함.
- 현재 어머니는 치매 진단 후 주간보호센터를 이용하고 있으며, 내담자는 동생과 함께 지속적으로 돌봄과 생활 지원을 담당하고 있음.
- 남편은 과거 빚 문제와 가족 문제를 수용하고 지지해준 중요한 정서적 지지자이며, 내담자는 부모와 관련된 죄책감·원망·상처를 정리하고 싶어 함.
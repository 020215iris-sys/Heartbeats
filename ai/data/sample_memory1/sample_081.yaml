important_memory:
- 중학교 시절부터 청소년 상담사에 관심을 가져왔으며, 친구들의 고민을 들어주고 긍정적 피드백을 받으면서 상담 분야 진학을 결심함.
- 장래 희망은 상담 분야로 유지하고 있으나 대학원 진학과 세부 진로 방향에 대해 고민하고 있음.
- 과거 대학원생 연구 상담에 참여하여 약 6회기 동안 소외감으로 인한 스트레스 문제를 다룬 경험이 있음.
- 가족은 부모와 오빠로 구성되어 있으며, 현재는 어머니와 함께 거주하고 아버지는 타지에서 생활하며 오빠는 결혼 후 분가함.
- 어머니의 영향으로 태어날 때부터 기독교 신앙생활을 해왔으며, 종교가 자신의 정서적 안정에 가장 중요한 역할을 한다고 인식함.
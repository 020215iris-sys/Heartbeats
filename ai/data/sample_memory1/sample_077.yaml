main_complaint: 스마트폰 사용 시간이 과도하게 길어 수면과 작업에 영향을 받고 있으며 줄이고 싶음

core_topics:
- 스마트폰 과의존
- 수면 습관
- 학원 스트레스
- 자동적 사고 탐색

next_session_notes: 스마트폰 사용 환경 변경 실천 여부와 수면·작업 시간 변화 탐색 필요

prompt_adjustment:
- behavioral_activation
- habit_change_support
- cognitive_reframing

important_memory:
- 컴퓨터 그래픽 관련 학원을 다니며 작업 및 취업 준비를 하고 있음.
- 월요일과 화요일에 아르바이트를 하고 있음.
- 격일로 헬스장을 다니며 운동을 지속하고 있음.
- 다음 달부터 학원 수업과 피드백 일정을 추가로 진행할 예정임.
- 학원에서 관계가 불편한 사람과 마주칠 가능성 때문에 스트레스를 경험하고 있음.
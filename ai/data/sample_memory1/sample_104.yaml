important_memory:
- 어제 하루 종일 학교에 있었음.
- 수요일에도 거의 학교에 있었음.
- 정자세로 자고 나서 컨디션이 괜찮았음.
- 일요일에 2급 실기 시험이 있음.
- 대학 선택은 본인의 선택이 아니었음.
- 어렸을 때부터 자율적으로 해본 경험이 별로 없음.
- 엄마가 통제적이어서 자율성이 부족함.
- 조별 과제를 할 때 혼자 많이 했음.
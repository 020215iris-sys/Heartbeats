important_memory:
- 결혼 후 3일 만에 해외로 이주하여 약 23년간 해외에서 생활함.
- 코로나 시기에 배우자와 함께 한국으로 귀국했으며 성인이 된 두 자녀는 해외에 남아 생활하게 됨.
- 두 자녀를 해외에 두고 온 이후 죄책감과 불안을 지속적으로 경험해 왔음.
- 대학원에서 상담 관련 석사 과정을 밟고 있으며 청년·유학생·다문화 가정을 돕고자 하는 동기로 공부를 시작함.
- 결혼 후 오랜 기간 시어머니의 영향력이 강한 가족 체계 안에서 지냈으며 최근 시어머니와의 관계를 재해석하면서 거절감·배신감·분노를 자각하게 됨.
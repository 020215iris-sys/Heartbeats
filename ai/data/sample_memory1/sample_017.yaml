important_memory:
- 임상심리학 석사 과정 중이며 현재 논문 작성 단계로, 질적 연구 프로그램 진행을 위해 외부 기관의 협조를 기다리는 상황에서 일정 불확실성으로 인한 불안을 경험하고 있음.
- 4살 때 부모 이혼 후 조부모가 주 양육자였으며, 어머니와 여동생과 현재 함께 거주 중이고 아버지와는 중학교 이후 연락이 없음.
- 실패에 대한 두려움과 미래 부정적 경우의 수를 과도하게 대비하는 사고 패턴이 반복되며, 이를 스스로 인식하고 있음.
- 고등학교 1학년 담임 교사가 이혼 가정 출신이었던 경험이 자기 개방의 전환점이 되었으며, 중학교 때 받은 상담이 상담사 진로 결정에 영향을 줌.
- 청소년상담사 2급 자격증을 개인적으로 준비 중이며, 졸업 후 취업처로 생각해 둔 곳이 있음.
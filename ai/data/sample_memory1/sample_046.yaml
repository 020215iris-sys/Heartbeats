main_complaint:
연인과의 갈등 상황에서 강한 부적절감과 버림받을 것 같은 불안을 경험하며 혼란스러운 반응 패턴을 보임.

core_topics:
- 연인관계
- 부적절감
- 버림받음불안
- 어린시절경험
- 자동반응패턴

next_session_notes:
연인과의 갈등 상황에서 활성화되는 부적절감과 버림받음 불안의 기원을 탐색하고 현재 관계에서 보다 유연한 대처 방식을 연습할 필요

prompt_adjustment:
- attachment_exploration
- emotional_awareness
- self_compassion

important_memory:
- 여자친구와의 갈등 이후 자신의 말실수와 상대의 반응에 대해 과도한 부적절감과 불안을 경험함
- 여자친구가 아프다고 여러 차례 말했던 부분을 충분히 신경 쓰지 못한 것이 갈등의 주요 원인 중 하나였음을 알게 됨
- 어린 시절 형제들과 비교되며 타인을 배려하지 못한다거나 이기적이라는 평가를 자주 들음
- 어머니를 두려워했으며 혼나거나 맞는 경험 때문에 감정을 표현하기보다 억누르는 경향이 형성됨
- 청소년기와 초기 성인기에 대인관계와 사회적 상황에서 어떻게 행동해야 하는지 몰라 혼란을 자주 경험함
core_topics:
- 스마트폰의존
- 게임몰입
- 집중저하
- 가족스트레스

next_session_notes:
스마트폰 사용 갈망과 회피적 사용 패턴 탐색 필요

prompt_adjustment:
- behavioral_addiction_support
- impulse_regulation
- emotional_awareness

important_memory:
- 가족 내 갈등과 부모의 경제적 어려움을 오래전부터 인식하고 있었으나 의도적으로 거리를 두고 살아왔으며, 상담을 통해 이를 다시 마주하면서 가족 상황에 대한 슬픔과 안타까움을 느끼고 있음.
- 진학 및 진로를 결정할 때 개인의 희망보다 가정의 경제적 부담을 먼저 고려하는 경향이 있으며, 대학원 진학이 가족에게 부담이 될 수 있다는 생각 때문에 진로 선택에 어려움을 경험하고 있음.
- 부모는 학업을 지속하는 것을 지지하고 있으나, 본인은 빨리 자리 잡아 가족에게 경제적으로 도움이 되어야 한다는 책임감을 강하게 가지고 있음.
- 아버지와의 정서적 소통은 제한적이지만 진로나 진학 관련 현실적인 조언은 받는 편이며, 동생보다 아버지와의 유대감은 상대적으로 약하다고 인식하고 있음.
- 스마트폰(유튜브·릴스·쇼츠)을 가장 통제하기 어려운 행동으로 인식하고 있으며, 공부·과제 수행 중이나 취침 전에도 반복적으로 사용해 집중력 저하와 수면 지연을 경험하면서도 최근까지는 문제의 심각성을 크게 자각하지 못했음.
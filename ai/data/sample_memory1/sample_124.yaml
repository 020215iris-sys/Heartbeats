main_complaint:
내담자는 아이들과의 수업 일정과 관련된 피로감에 대해 이야기하고 있다.
core_topics:
- 아이들과의 수업 일정
- 학교 재량 휴업일
- 수업 스케줄 조정
- 상담에 대한 관심
- 자아 성장
- 의미 있는 시간 보내기
next_session_notes:
내담자가 상담을 통해 아이들과의 관계 및 자신의 직업적 성장에 대해 더 깊이 탐구할 필요가 있다.
prompt_adjustment:
- 내담자의 피로감에 대한 구체적인 사례를 들어보자.
- 상담을 통해 어떤 방향으로 나아가고 싶은지 구체화해보자.
important_memory:
- 내담자는 아이들과 함께 하는 일을 하고 있으며, 학교 재량 휴업일로 인해 수업 일정이 불규칙하다.
- 내담자는 오전에 수업을 빨리 끝내고 싶어하지만, 아이들이 제시간에 오지 않아 일정이 밀린다.
- 내담자는 상담을 통해 전문적인 방향을 제시하고 싶어한다.
- 내담자는 나이가 들어도 일을 계속하고 싶어하며, 무기력하게 지내는 것을 싫어한다.
- 내담자는 의미 있는 시간을 보내는 것에 대해 중요하게 생각하고 있다.
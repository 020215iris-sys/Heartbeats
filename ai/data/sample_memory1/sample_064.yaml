main_complaint:
수술 이후 회복 지연과 미래 불안으로 무기력과 집중 저하 지속

core_topics:
- 미래불안
- 회복지연
- 통증스트레스
- 자기압박

next_session_notes:
쉬지 못하는 삶의 패턴과 성취 중심 사고 탐색 필요

prompt_adjustment:
- anxiety_support
- cognitive_reframing
- self_compassion_support

important_memory:
- 손 관련 수술 후 회복이 예상보다 길어져 약 8개월째 치료와 휴식을 이어가고 있으며, 통증과 수면장애로 일상생활에 영향을 받고 있음.
- 대학 학부 과정에 재학 중이며 자격증 취득과 학업을 지속하고 있으나, 건강 문제로 인해 수강 과목 수를 줄여 조정함.
- 쉬는 동안에도 자격증 공부를 계속했으며, 과도한 사용으로 손가락 상태가 악화되어 학습 방식에 제약이 생김.
- 배우자 및 딸과 함께 생활하고 있으며, 가족보다는 타 지역에 거주하는 친구들과의 교류를 통해 정보와 조언을 얻고 있음.
- 과거 사람을 상대하는 전문 기술 직종에서 근무했으며, 업무 실수를 줄이기 위해 지속적으로 자기 점검과 개선 노력을 해온 경험이 있음.
main_complaint:
인정욕구와 휴식에 대한 죄책감 지속

core_topics:
- 인정욕구
- 관계갈등
- 자기돌봄
- 완벽주의

next_session_notes:
휴식 불안과 욕구 표현 방식 탐색 필요

prompt_adjustment:
- relational_communication
- self_care_support
- emotional_validation

important_memory:
- 남자 친구와의 대화 방식 차이로 마찰이 있었으며, 남자 친구에게 말의 의도를 먼저 좋게 전달해 달라고 직접 요청함.
- 혼자 여행하거나 혼자만의 시간을 가질 때 편안함과 만족감을 느끼며, 타인이 같은 공간에 있을 때는 온전한 휴식이 어렵다는 것을 스스로 인식함.
- 아무것도 하지 않는 휴식보다 결과가 도출되는 활동에서 만족감을 느끼는 사람임을 이번 회기를 통해 새롭게 인식함.
- 사람에 대한 불신이 있으나 남자 친구는 신뢰할 수 있는 존재로 인식하고 있으며, 어머니에 대해서는 경제적 신뢰를 유지하고 있음.
- 올해 1월부터 무기력감으로 인해 운동을 중단하였고, 과식이 지속되어 체중이 6~7kg 증가한 상태임.
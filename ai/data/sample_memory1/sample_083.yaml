main_complaint:
어머니와의 관계에서 반복되는 부담감과 서운함을 다루고 싶으며 자신의 감정과 욕구를 돌아보고 싶음

core_topics:
- 모녀갈등
- 자기희생
- 진로탐색
- 감정인식

next_session_notes:
어머니를 지속적으로 돌보게 된 배경과 자기욕구를 미뤄온 경험이 현재 관계와 선택에 미치는 영향 탐색 필요

prompt_adjustment:
- family_relationship
- self_awareness
- boundary_building

important_memory:
- 대학 재학 중 아버지가 돌아가신 후 학업을 반복적으로 중단하며 어머니의 일을 돕고 동생들의 진학을 우선시함.
- 첫째 딸로서 어머니의 사업을 오랫동안 함께 운영했으며 약 2년 전 독립하여 자신의 사업을 맡게 됨.
- 결혼 후 자녀를 양육하고 있으며 최근 편입하여 대학에서 상담 관련 전공을 공부하고 있음.
- 어머니와의 관계에서 오랫동안 도움을 제공해 왔으나 최근 거리두기를 하게 될 정도로 갈등과 서운함이 커짐.
- 어릴 때부터 자신의 욕구보다 가족의 필요를 우선하는 역할을 맡았으며 동생들과 비교해 순응적이고 책임을 많이 지는 위치에 있었음.
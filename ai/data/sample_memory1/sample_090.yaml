main_complaint: 
우울감과 분노 조절의 어려움, 자녀 양육 과정에서의 과도한 개입 및 죄책감, 원가족 경험과 연결된 정서적 부담

core_topics:
- 자녀양육패턴
- 원가족경험
- 우울및분노
- 정서회복자원

next_session_notes: 
원가족에서 경험한 두려움과 정서적 결핍이 현재 양육과 대인관계에 미치는 영향을 탐색하고 긍정 정서를 높이는 활동 실천 경험 확인 필요

prompt_adjustment:
- parenting_reflection
- family_of_origin_exploration
- behavioral_activation

important_memory:
- 어린 시절 부모의 잦은 부부싸움과 자살 위협 및 실제 자살 시도를 반복적으로 목격하며 성장함.
- 성인이 된 이후에도 부모의 갈등 속에서 생활했으며 아버지의 자살 시도를 직접 발견한 경험이 있음.
- 아버지는 이후 스스로 생을 마감하였으며 이에 대한 미해결된 슬픔과 안타까움을 가지고 있음.
- 청소년기 교회 공동체에서 드럼 연주와 공동체 활동을 하며 정서적 안식처와 지지를 경험함.
- 손으로 만드는 활동을 좋아하며 프랑스 자수, 바느질, 쿠키와 마들렌 굽기에서 즐거움과 성취감을 느낌.
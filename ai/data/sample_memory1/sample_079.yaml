main_complaint: SNS와 미디어 사용을 줄이고 싶지만 현실 문제를 회피할 때 의존하게 되며 통제의 어려움을 느낌

core_topics:
- SNS 사용 습관
- 문제 회피 경향
- 미디어 의존 인식
- 대체 활동 탐색

next_session_notes: 에어팟 없이 이동하며 주변 환경 관찰하기 실천 경험과 미디어 사용 조절 변화 탐색 필요

prompt_adjustment:
- media_use_awareness
- avoidance_pattern_exploration
- behavior_substitution

important_memory:
- 부모님, 언니, 오빠와 관계가 양호하며 가족사진을 통해 반려견인 모카의 소식을 자주 확인함.
- 형제 구성은 언니 1명, 오빠 1명이며 본인은 막내임.
- 친구들과의 관계를 중요하게 여기며 감정적으로 안전하다고 느끼는 친구들과 깊은 관계를 유지함.
- 갈등 상황에서 직접 해결하기보다 참고 넘어가거나 관계에 거리를 두는 경향이 있음.
- 인스타그램과 트위터를 사용하며 사회 이슈와 뉴스도 꾸준히 찾아보는 편임.
main_complaint:
상담 전날 불안과 피로감
core_topics:
- 상담 준비 과정
- 내담자와의 관계 변화
- 상담 일정 조정
- 불안한 감정
- 긍정적인 사고 전환
next_session_notes:
내담자와의 관계를 더욱 깊이 있게 다루기 위한 준비 필요
prompt_adjustment:
- 상담 전날의 불안감 해소 방법 탐색
- 내담자의 감정 상태에 대한 이해 증진
important_memory:
- 내담자가 상담 전날 늦게 자고 일어나는 생활을 하고 있음
- 상담 일정이 오후에서 10시로 변경됨
- 내담자가 상담 중 내담자의 미안함과 고마움을 느꼈음
- 내담자가 슈퍼비전에서 불안감을 느꼈음
- 내담자가 상담 준비를 하면서 불안과 피로감을 느꼈음
- 내담자가 긍정적인 마음으로 전환하려고 노력함
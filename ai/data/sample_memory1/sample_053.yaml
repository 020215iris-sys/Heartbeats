important_memory:

- 15년간 함꼐한 반려견을  떠나보낸 이후 살던 집에 들어가지 못하고 언니 집과 귀농 프로그램에 머물며 무기력한 상태로 지내고 있음.
- 이별에 대한 슬픔보다 빨리 발견하지 못한 것에 대한 죄책감과 미안함이 더 크게 남아 있음.
- 어렸을 때부터 가족의 죽음(아버지: 초등학교 6학년 때 사망, 할아버지·할머니)에 대한 충분한 감정 처리 경험 없이 지내왔으며, 가족을 잃는 것에 대한 두려움이 크고 이것이 이번 이별에도 영향을 미치고 있음.
- T 성향이 강하고 완벽주의적이며 목표 지향적이나, 자신의 감정을 읽고 표현하는 것이 익숙하지 않아 스스로도 감정 인식이 부족하다고 자각하고 있음.
- 연구년 기간 중 원래 계획한 공부(석사 논문 등)가 전면 중단된 상태이며, 이를 허송세월로 느끼며 추후 후회할 것에 대한 불안이 있음.
main_complaint:
대인관계 상처와 자기비난으로 인한 신뢰 어려움

core_topics:
- 대인신뢰어려움
- 자기책임화사고
- 스토킹트라우마
- 공동체를통한회복

next_session_notes:
자기비난과 신뢰 어려움 탐색 필요

prompt_adjustment:
- trust_building
- self_compassion
- trauma_processing

important_memory:
- 과거 연인으로부터 스토킹을 당한 경험이 있으며 이후 안전에 대한 경계심과 불안이 생김.
- 스토킹 이후 본가로 다시 들어가 생활하며 불안을 견디고 안전 경험을 반복적으로 쌓아옴.
- 교회 공동체와 목회자, 사모의 지지 속에서 자신의 어려움을 공개하고 수용받는 경험을 함.
- 교회 수련회 및 신앙 경험을 통해 자신이 사랑받을 가치가 있는 존재라는 인식을 형성하기 시작함.
- 카페를 운영하며 사람들에게 편안함과 안정감을 제공하는 공간을 만들고 싶다는 바람이 있음.
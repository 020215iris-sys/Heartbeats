main_complaint:
통제받는 상황에서 관계불안과 감정기복 지속

core_topics:
- 관계불안
- 통제민감성
- 감정기복
- 애착문제

next_session_notes:
통제 경험과 감정 반응 패턴의 연결 탐색 필요

prompt_adjustment:
- attachment_support
- emotional_regulation
- emotional_awareness

important_memory:
- 대인관계에서 상대에게서 부모와 비슷한 통제적·무시하는 모습을 발견하면 강한 거부감이 나타나며, 특히 명령조 표현이나 자신의 의견을 무시하는 행동에 민감하게 반응함.
- 현재 상담의 주요 목표로 연인 및 친구 관계에서 자신이 무엇을 원하는 사람인지 명확히 이해하고 자신의 욕구와 선택 기준을 파악하고 싶다고 이야기함.
- 성인이 된 이후 어머니는 과거 양육 방식에 대해 사과하고 사용자의 의견을 존중하는 방향으로 변화하였으며, 아버지와는 정서적 연결감이 거의 없다고 인식하고 있음.
- 가족과 함께 있을 때보다 자취를 시작한 이후 훨씬 큰 안정감과 자유로움을 경험했으며, 혼자 있을 때와 관계 속에 있을 때의 자신의 모습 차이를 다음 회기에서 더 탐색하기로 함.
main_complaint:
내담자가 육아와 관련된 스트레스와 남편과의 갈등을 겪고 있음.
core_topics:
- 첫째와 둘째 자녀 간의 관계
- 남편과의 육아 분담 문제
- 자신의 육아 방식에 대한 스트레스
- 자녀의 건강과 애착 문제
- 자신의 감정 조절 문제
next_session_notes:
남편과의 대화에서 느낀 감정과 갈등을 더 깊이 탐구할 필요가 있음.
prompt_adjustment:
- 남편과의 소통 방식을 개선하기 위한 구체적인 방법 모색
- 자신의 감정 표현 방식을 점검하고 조절하는 연습
- 자녀와의 관계에서 느끼는 감정에 대한 이해 증진
important_memory:
- 첫째 아들이 동생에게 다정하게 대하는 모습
- 내담자가 36개월까지는 엄마가 키워야 한다는 기준을 가지고 있었음
- 내담자가 자녀를 낳고 나서 용기가 생겼다고 느낌
- 내담자가 자녀에게 폭발했던 경험과 그로 인한 죄책감
- 내담자가 자녀의 건강과 애착을 중요하게 생각함
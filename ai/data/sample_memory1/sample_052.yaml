main_complaint:
직장 실패 경험 이후 자기 확신 저하와 미래 불안 반복

core_topics:
- 자기불신
- 직장트라우마
- 가족갈등
- 진로불안

next_session_notes:
첫 직장 실패 경험과 자기비난 패턴의 연결성 탐색 필요

prompt_adjustment:
- self_efficacy_support
- cognitive_reframing
- emotional_validation

important_memory:
- 자기 능력에 대한 확신 부족과 관련된 우울로, 학부 때 두 차례 받은 심리검사에서 언어 외 영역이 평균 이하로 나온 이후 능력에 대한 부정적 신념이 강화됨.
- 학부 졸업 직후 들어간 첫 직장에서 1개월 만에 퇴사한 경험이 트라우마로 남아 있으며, 퇴사 후 부모님과 담임 선생님으로부터 비난·비아냥을 받은 기억이 현재 취업 불안과 회피의 주요 원인임.
- 아버지와 최근 문자 갈등 후 약 한 달째 연락 단절 상태이며, 부모님은 오랫동안 실질적 별거 상태로 자녀를 통해 소통해 왔음. 어머니와는 현재 동거 중.
- 우울 관련 증상으로 과수면(8시간 수면 + 낮잠), 무기력, 쉽게 지침이 있으며, 스스로를 다독인 경험이 거의 없고 자책 패턴이 지속되어 왔음.
- 이번 회기 과제로 월·화는 아무것도 안 하는 날로 지정, 수·목 저녁 산책(1회 이상), 논문 작업 하루 1시간 타이머 활용. 다음 회기는 다음 주 화요일 동일 시간 예정.
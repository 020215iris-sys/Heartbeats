main_complaint:
내담자가 직장에서의 불안과 스트레스, 그리고 감정에 대한 회피를 이야기함.
core_topics:
- 불안
- 직장 스트레스
- 자기 가치
- 감정 회피
- 사회적 비판
next_session_notes:
내담자가 감정에 대해 이야기하기를 원하지 않음. 직장 내 어려움과 불안에 대한 구체적인 사례를 더 탐색할 필요가 있음.
prompt_adjustment:
- 내담자의 감정 회피 경향을 고려하여 질문 조정 필요
- 직장 내 경험에 대한 구체적인 사례를 더 깊이 탐색
important_memory:
- 내담자는 @PLACE에 가서 친구를 만나고 산책을 하며 시간을 보냈음.
- 내담자는 현재 직장에서 두 달 정도 근무하고 있음.
- 내담자는 이전 직장에서의 경험이 좋지 않았다고 언급함.
- 내담자는 현재 직장에서 개인주의적인 분위기를 느끼고 있음.
- 내담자는 직장에서의 업무가 빠르게 진행되어 힘들다고 느낌.
- 내담자는 수출 절차서를 작성하는 데 어려움을 겪었음.
- 내담자는 현재 감정 상태를 30~40점으로 평가함.
main_complaint:
실수하지 않고 모든 것을 완벽하게 해야만 한다는 생각이나 느낌이 들 때가 있다.
core_topics:
- 상담 업무
- 성공에 대한 압박
- 완벽주의
- 진로 변화
- 실패 경험
next_session_notes:
내담자의 완벽주의와 성공에 대한 압박을 다루고, 진로에 대한 고민을 심화할 필요가 있다.
prompt_adjustment:
- 내담자의 감정과 생각을 더 깊이 탐구하기
- 완벽주의가 내담자에게 미치는 영향 논의하기
important_memory:
- 내담자는 주말에 군산 본가로 내려가고, 상담 친구들을 만나야 한다.
- 내담자는 7월에 상담한 내용을 마감해야 한다.
- 내담자는 상담 교사를 꿈꿨으나, 현재는 임상 쪽에 관심을 갖고 있다.
- 내담자는 @SCHOOL에 떨어진 경험이 있다.
- 내담자는 4.3의 성적을 기록했다.
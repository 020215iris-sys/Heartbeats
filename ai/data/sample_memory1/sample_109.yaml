- 상담 효과
- 청소년기 경험
- 교회 활동
- 대인 관계
next_session_notes:
더 많은 고민과 방향성에 대한 논의 필요
prompt_adjustment:
- 진로에 대한 구체적인 목표 설정
- 자기 객관화 증진 방법 모색
important_memory:
- 수요일 상담 후 삶의 패턴 형성에 대한 고민 시작
- 상담사와의 대화를 통해 고민 정리
- 대학원 진학 후 진로에 대한 혼란 경험
- 청소년기 동안 교회 활동에 많은 시간 투자
- 교회에서의 관계가 학교보다 우선순위가 높았음
- 교회 친구들과의 관계가 학교 친구들보다 더 밀접했음
main_complaint:
무기력감과 낮은 자기효능감

core_topics:
- 자기가치감저하
- 부모영향과진로
- 대인관계해석
- 강점재발견

next_session_notes:
타인의 행동을 무시나 거절로 해석하게 되는 사고 패턴과 부모로부터 형성된 자기평가 방식 탐색 필요

prompt_adjustment:
- cognitive_reframing
- strength_exploration
- self_efficacy

important_memory:
- 신학을 전공했으며 부모의 권유와 영향으로 진로 선택 과정에서 자신의 의사를 충분히 반영하지 못했다고 느낌.
- 뇌수종과 목·어깨 통증, 디스크로 인해 장시간 공부나 육체노동에 어려움을 경험함.
- 수지침과 마사지에 관심이 있었고 주변 사람들로부터 손으로 통증 부위를 잘 찾고 잘 풀어준다는 평가를 받음.
- 교회와 학교 생활에서 오랫동안 꾸준히 참여하고 성실하게 출석했다는 평가를 받아옴.
- 어머니가 몸이 불편할 때 자주 마사지와 통증 완화를 도와주고 있음.
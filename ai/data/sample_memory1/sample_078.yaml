main_complaint: 흡연 충동이 강하고 금연을 원하지만 담배를 삶의 일부로 느끼며 의존하고 있음

core_topics:
- 흡연 의존
- 금연 동기
- 흡연 관련 신념
- 대체 행동 탐색

next_session_notes: 호흡법과 커피 마시기 실천 경험 및 흡연 충동 변화 탐색 필요

prompt_adjustment:
- smoking_cessation_support
- cognitive_reframing
- behavior_substitution

important_memory:
- 전자담배를 사용하고 있으며 완전한 금연을 목표로 하고 있음.
- 흡연자들과 담배를 피우며 친밀감을 형성하는 경험이 많았음.
- 남편과 직장 동료에게 고민을 이야기하며 스트레스를 해소하는 편임.
- 흡연으로 인해 체력 저하와 건강 악화를 체감하고 있음.
- 아침 기상 직후 흡연 욕구가 가장 강하게 나타나는 패턴을 보임.
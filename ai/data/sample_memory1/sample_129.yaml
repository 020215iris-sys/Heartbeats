main_complaint:
내 부모님과의 관계에서 상처받고, 그로 인해 무기력함을 느끼고 있다.
core_topics:
- 자기 공감
- 부모님과의 관계
- 어린 시절의 기억
- 사랑받고 싶은 욕구
- 우울증
- 약물 복용
- 사회적 관계
next_session_notes:
내담자가 부모님과의 관계에서 느끼는 감정과 그로 인한 무기력함에 대해 더 깊이 탐구할 필요가 있다.
prompt_adjustment:
- 내담자가 자신의 감정을 더 솔직하게 표현할 수 있도록 도와주기
- 부모님과의 관계에서의 상처를 인정하고 치유하는 방법 모색하기
important_memory:
- 내담자는 고등학교 시절 감정을 소중히 다루지 못했다고 회상함.
- 내담자는 어린 시절 가족의 화목한 기억을 회상하며 부모님의 사랑을 다시 받고 싶어함.
- 내담자는 부모님과의 대화에서 상처받았음을 인정함.
- 내담자는 7월부터 부모님과의 연을 끊겠다고 결심함.
- 내담자는 4년 전액 장학금을 받았고, 이번 학기에 4.1의 학점을 받음.
- 내담자는 최근 3주 된 남자친구와의 관계에서 지지를 받고 있다고 느낌.
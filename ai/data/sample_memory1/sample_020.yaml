important_memory:
- 아동학대 관련 기관의 팀장으로 근무 중이며, 직원 슈퍼비전과 사례 관리가 주 업무로 업무 강도가 매우 높고 소진 위험이 상존함.
- 아들이 희귀 자가면역 질환으로 16시간 수술을 받았고 현재 회복이 완전하지 않은 상태로, 약 1년 전부터 인도에 있는 삼촌(내담자의 남동생)에게 맡겨져 지내고 있음. 아들과는 영상 통화 대신 이메일로만 소통하고 있음.
- 어린 시절 연년생 동생을 익사로 잃었으며, 당시 가족 모두 이 상실을 오랫동안 공개적으로 애도하지 못했음. 세월호 사건을 계기로 처음으로 가족과 함께 이 상실을 다루었고 해방감을 경험함.
- 어렵거나 감당하기 힘든 감정은 '해결될 때까지 묶어두는' 회피 패턴이 있음을 스스로 인식하고 있으며, 현재 아들 문제에도 이 패턴이 작동하고 있음.
- 대전 직장까지 편도 50분 출퇴근 중이며, 다음 회기는 비대면으로 목요일에 진행 예정임.
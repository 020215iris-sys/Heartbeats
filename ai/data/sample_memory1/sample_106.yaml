main_complaint:
재택근무와 관련된 스트레스 및 남편과의 관계에서 느끼는 유능감에 대한 고민
core_topics:
- 완벽주의
- 유능감
- 남편과의 대화
- 도움 요청의 어려움
- 감정 표현
next_session_notes:
남편과의 대화에서 느낀 감정과 유능감에 대한 인식을 더 깊이 탐구하기.
prompt_adjustment:
- 유능하지 않다는 인식에 대한 감정 탐색
- 도움 요청에 대한 불편함의 원인 분석
important_memory:
- 내담자는 남편이 '당신은 생각보다 유능하지 않은 게 더 많아'라고 말한 것을 기억하고 있다.
- 내담자는 남편과의 대화에서 유능하지 않은 부분을 인정하게 되었다.
- 내담자는 남편과의 관계에서 도움 요청이 어려운 이유를 인식하게 되었다.
- 내담자는 결혼 전후로 도움을 요청하는 태도가 변화하고 있음을 느끼고 있다.
main_complaint:
우울감과 불안 증가, 자기표현의 어려움, 대인관계에서의 정서적 갈등

core_topics:
- 우울과무기력
- 불안반응
- 애착과대인관계
- 자기이해와자존감

next_session_notes:
타인에게 도움을 요청하기 어려운 패턴과 밀어내기-기다리기 관계 양상을 탐색하고 우울을 유지시키는 핵심 사고와 자기비난 구조를 구체적으로 확인할 필요

prompt_adjustment:
- emotional_validation
- attachment_exploration
- cognitive_reframing

important_memory:
- 부모가 신앙 관련 활동을 하며 성장했고 어린 시절부터 가족에게 정죄감과 부담을 느껴왔다.
- 언니 아래 3남매 중 한 명으로 성장했으며 가족 및 형제자매 관계의 영향을 크게 받음.
- 교회 셀모임과 신앙 공동체 활동을 지속적으로 하고 있음.
- 어릴 때부터 자신의 감정보다 타인의 요구와 만족을 우선하는 경향이 있음.
- 불안할 때 가장 가까운 친구와 어머니에게서 안정감을 느낀다고 말함.
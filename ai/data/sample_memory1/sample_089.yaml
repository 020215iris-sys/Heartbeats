main_complaint:
시댁과 남편으로부터 오랜 기간 수용받지 못했다고 느끼며 누적된 억울함과 분노가 폭발한 상태로, 감정 조절이 어려워지고 파국적인 표현이 증가하여 관계 악화와 자신의 소진을 걱정함

core_topics:
- 시댁갈등
- 부부소통문제
- 누적된억울함과분노
- 감정조절어려움

next_session_notes:
시댁 방문 이후 감정이 폭발하게 된 결정적 사건과 오랜 기간 누적된 좌절 경험을 탐색하고 파국적 사고 및 감정 폭발이 발생하는 과정, 부부관계에서 반복되는 상호작용 패턴을 구체적으로 살펴볼 필요

prompt_adjustment:
- emotional_regulation
- family_conflict
- marital_relationship

important_memory:
- 목회 현장에서의 소진과 번아웃 경험을 계기로 심리상담을 공부하기 시작함.
- 상담 관련 수련 과정을 진행하며 성인 내담자 상담 경험과 심리검사 경험을 쌓아옴.
- 남편 및 시댁과의 관계에서 오랜 기간 자신의 의견과 감정이 수용되지 않았다고 느껴옴.
- 시댁 방문 이후 누적된 분노와 억울함이 크게 폭발하면서 부부관계와 가족관계를 다시 바라보게 됨.
- 중학생 자녀와 초등학생 자녀가 있으며 현재 갈등 상황이 자녀들에게 미치는 영향을 우려하고 있음.
- 어린 시절 부모의 관심과 인정을 받기 위해 감정 표현을 억제하고 착한 행동을 하며 지냈다고 인식함.
- 상담 관련 석사 과정을 수학하며 자신의 불안이 형성된 배경과 원인을 탐색하고 있음.
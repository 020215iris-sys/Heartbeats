main_complaint:
내가 주변 사람들에게 의존하고, 그로 인해 상처받는 경험이 많다.
core_topics:
- 가족과의 관계
- 친구와의 신뢰 문제
- 학업 스트레스
- 정리 및 청소에 대한 고민
- 자기 관리 및 후회에 대한 두려움
next_session_notes:
내담자가 과거의 경험을 통해 느낀 감정과 현재의 스트레스 요인에 대해 더 깊이 탐구할 필요가 있다.
prompt_adjustment:
- 내담자의 학업과 관련된 스트레스 관리 방법에 대해 논의하기
- 과거의 친구와의 관계에서 배운 점을 현재의 관계에 어떻게 적용할 수 있을지 탐색하기
important_memory:
- 내담자는 막내와 함께 워터파크에 갔고, 아이들을 데리고 다니며 시간을 보냈다.
- 내담자는 청소와 집안일을 열심히 하려고 노력하고 있지만, 정리하는 데 어려움을 겪고 있다.
- 내담자는 대학에서 9과목을 수강하며 학업에 열중하고 있다.
- 내담자는 20대 때 친구와 함께 살았고, 그 친구에게 많은 신뢰를 보냈으나 결국 배신당했다.
- 내담자는 과거의 경험으로 인해 사람에 대한 신뢰를 잃고, 자책감을 느끼고 있다.
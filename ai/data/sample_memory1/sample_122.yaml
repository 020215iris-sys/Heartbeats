main_complaint:
허리 통증과 불안감
core_topics:
- 허리 통증
- 불안감
- 자기 인식
- 완벽주의
- 학창 시절 경험
next_session_notes:
내담자가 불안감을 느끼는 이유를 명확히 인식하고 있으며, 이를 통해 불안감을 조절하는 방법을 찾고 있음.
prompt_adjustment:
- 불안감 조절 방법 탐색
- 학창 시절 경험에 대한 논의
- 완벽주의에 대한 인식
important_memory:
- 내담자는 허리 통증이 일상생활에 영향을 미친다고 언급함.
- 내담자는 남편의 연락을 기다리고 있다고 말함.
- 내담자는 과거 학창 시절 수학 문제를 풀지 못해 멍청하다는 말을 들었던 경험을 회상함.
- 내담자는 음식에 대한 완벽주의를 가지고 있으며, 김치를 만들기 위해 많은 노력을 했다고 언급함.
- 내담자는 초등학교 시절 무기력함을 느꼈다고 회상함.
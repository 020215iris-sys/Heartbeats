main_complaint:
직장 스트레스와 인간관계 불신으로 인한 음주 및 회피적 생활 패턴 반복

core_topics:
- 직장스트레스
- 인간관계불신
- 음주의존
- 자존감저하

next_session_notes:
직장 내 무시 경험과 인간관계 배신 경험이 자기 가치감에 미치는 영향 탐색 필요

prompt_adjustment:
- emotional_validation
- self_worth_recovery
- avoidance_pattern_awareness

important_memory:
- 군 복무 중 어머니가 사망했으며 이에 대한 미안함과 상실감을 오랫동안 가지고 있음
- 일본에서 1년간 어학연수를 하며 하루 14시간 이상 아르바이트를 병행했고 JLPT 1급을 취득함
- 현재 무역 관련 직장에서 약 15년간 근무 중이며 일본어를 활용한 기술영업 분야 이직을 고민하고 있음
- 30년 지기 여성 친구에게 1천만 원 이상을 빌려준 뒤 약 3~4년째 연락이 끊긴 경험이 있음
- 동호회에서 호감을 가졌던 여성 및 관련 사람들에게 이용당했다고 느낀 경험이 있음
- 주말에는 지인의 라멘집에서 일하고 있으며 사람들과 교류하는 활동을 중요하게 여김
main_complaint:
가족 관계의 불편함과 소통의 어려움
core_topics:
- 명절의 가족 방문
- 시댁과 친정의 가족 분위기 차이
- 부모님의 건강 문제
- 아버지의 건강 염려증
- 가족 간의 소통 방식
- 자녀와의 관계
- 첫째 딸로서의 책임감
next_session_notes:
가족 간의 소통 방식과 개인의 감정에 대해 더 깊이 탐구할 필요가 있음.
prompt_adjustment:
- 가족 간의 소통 방식에 대한 구체적인 사례를 들어보세요.
- 자녀와의 관계에서 느끼는 감정에 대해 더 이야기해보세요.
important_memory:
- 내담자는 시댁 부모님이 일찍 돌아가셨고, 친정 부모님은 살아 계심.
- 내담자의 남편은 중학교 때 아버지가 돌아가셨고, 고등학교 때 어머니가 돌아가셨음.
- 내담자는 8남매 중 막내로 태어났음.
- 내담자의 아버지는 2년 전에 돌아가셨고, 코로나 시기에 폐 문제로 입원 후 패혈증으로 사망함.
- 내담자의 어머니는 건강이 좋지 않았으나 현재는 호전됨.
- 내담자는 자주 친정에 방문하며 가족의 상황을 살피고 있음.
- 내담자는 대학교 시절 자취를 하겠다고 결심함.
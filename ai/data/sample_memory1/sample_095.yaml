important_memory:
- 초등학교 입학 전 낯선 성인에게 성폭력 피해를 경험했으며 당시 부모에게 충분한 보호와 위로를 받지 못함.
- 어린 시절 어머니가 믿던 종교 집단 내에서 반복적인 성추행 및 성폭력성 경험을 겪었음.
- 부모의 잦은 갈등을 보며 성장했고 결혼에 대한 거부감과 두려움을 오랫동안 가짐.
- 부모에게 자신의 감정과 생각을 표현하기 어려웠으며 큰딸로서 순응적인 역할을 수행해옴.
- 남편은 오랜 기간 정서적 지지자 역할을 해왔으며 현재도 가장 안전하게 감정을 표현할 수 있는 대상으로 인식함.
main_complaint:
음주 의존과 정서 안정 욕구 사이의 혼란 지속

core_topics:
- 알코올의존
- 스트레스해소
- 수면문제
- 자기통제

next_session_notes:
음주와 정서 조절 방식의 연결 구조 탐색 필요

prompt_adjustment:
- emotional_awareness
- addiction_support
- stress_management

important_memory:
- 상담사로 근무 중이며 상담사 1급 자격 수련을 계속할지 고민하고 있고, 동료들의 박사과정 진학 소식까지 겹치며 자신의 진로 방향성에 대한 혼란을 경험하고 있음.
- 알코올 사용 문제를 줄이기 위해 CBT 상담에 참여했으며, 현재 목표는 금주가 아니라 거의 매일 반복되는 음주 습관을 줄이는 것으로, 다음 회기 전까지 음주 빈도를 격일 수준으로 줄여보기로 함.
- 첫째 아이 출산 직전 시누이를 사고로 잃은 이후 남편이 장기간 음주와 부재를 반복했고, 당시 혼자 육아와 생활을 감당하는 과정에서 현재까지 이어지는 혼술 습관이 형성되기 시작함.
- 어머니를 일찍 여의고 아버지와도 함께 살지 못한 경험으로 인해 가족의 의미를 크게 여기며, 현재도 가족이 있는 집에 머무르려는 성향과 가족을 지키려는 책임감을 중요하게 생각하고 있음.
- 상담사로서 자신의 알코올 사용 문제를 해결하지 못한 채 중독 문제 내담자를 상담하는 것에 대한 고민이 있으며, 직업적 책임감과 자기 일치성을 위해 행동 변화를 원하고 있음.

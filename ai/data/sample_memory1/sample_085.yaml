main_complaint:
상담 경험을 통해 자신도 인식하지 못한 감정과 내면의 어려움을 이해하고 싶으며 가족 문제와 관련된 감정 상태를 탐색하고 싶음

core_topics:
- 가족관계
- 감정억압
- 신앙
- 자기이해

next_session_notes:
가족 갈등 속에서 형성된 감정 억제 방식과 책임감이 현재 대인관계 및 자기인식에 미치는 영향 탐색 필요

prompt_adjustment:
- emotional_awareness
- family_dynamics
- self_exploration

important_memory:
- 부모 모두 기독교 사역자이며 어린 시절부터 신앙 환경에서 성장함.
- 과거 교회에서 아동부와 청소년부 사역을 담당했으며 현재는 교회를 옮겨 새로운 교회에 출석 중임.
- 어머니는 허리 부상 이후 우울과 불안이 심해졌고 가족 내 갈등과 부부 싸움이 오랫동안 반복됨.
- 어린 시절부터 부모 갈등 상황에서 중재자 역할을 맡았으며 가족 문제를 가장 많이 알고 있는 사람이라고 느껴옴.
- 가족 회복에 대한 책임감을 강하게 가지고 있으며 자신이 가정의 회복에 쓰임받을 것이라는 신앙적 믿음을 가지고 있음.
main_complaint:
교회와 직장의 갑작스러운 변화로 인한 상실감, 무기력감, 우울감 및 통제감 상실 경험

core_topics:
- 환경변화적응
- 상실감
- 우울감
- 죄책감
- 자기효능감

next_session_notes:
통제할 수 없는 변화 상황에서 느끼는 죄책감과 자기비난의 근거 및 자동사고 탐색 필요

prompt_adjustment:
- emotional_validation
- cognitive_restructuring
- self_efficacy_reinforcement

important_memory:
- 교회 담임목사가 다른 지역으로 이동하게 되면서 교회 통합 및 구조 변화가 예정되어 있음
- 학원 조직 개편으로 기존 직원들은 교체되었으나 원장에게 인정받아 영어유치원 업무로 함께 이동하게 됨
- 교회에서 전도사와 반주 사역을 계속 맡게 되었으며 사역 역할은 유지됨
- 과거 직장에서 성희롱성 언행을 하던 남성이 교회 통합 과정에서 다시 같은 교회 구성원으로 합류할 예정임
- 남동생과 약 10년간 소원한 관계를 유지했으나 결혼 전 사과를 받은 뒤 최근 조카를 통해 관계가 회복되고 있음
- 미국에 거주 중인 어머니와 교회 변화 및 개인 상황을 공유하며 연락을 유지하고 있음
main_complaint:
스마트폰과 인스타그램 사용 시간을 줄이려 하지만 밤에 조절하지 못하고 계속 사용하게 되어 조절 실패 패턴과 관련 신념을 탐색함

core_topics:
- 스마트폰사용
- 인스타그램사용
- 사회적소통인식
- 충동조절전략
- 주의전환훈련

next_session_notes:
알람 설정과 주의전환 전략 실천 결과 및 스마트폰 사용 조절 성공·실패 경험 탐색 필요

prompt_adjustment:
- impulse_control
- self_monitoring
- attention_shifting

important_memory:
- 평일 스마트폰 사용 시간은 약 4시간, 주말은 6~7시간 정도라고 보고함.
- 인스타그램을 주로 사용하며 빵과 카페 관련 콘텐츠를 자주 탐색함.
- 보통 밤 12시경 취침하고 오전 6시경 기상하는 생활 패턴을 가지고 있음.
- 아침 시간에 회복탄력성 관련 독서를 시작함.
- 향후 자격증 취득을 고려하고 있으며 관련 도서를 찾아볼 계획을 세움.
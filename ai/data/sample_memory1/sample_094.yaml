main_complaint:
위축감과 긴장감

core_topics:
- 자녀부재상실감
- 시댁관계위축
- 상담전문성불안
- 자기이해탐색

next_session_notes:
위축감을 유발하는 핵심 신념과 당위적 사고 탐색 필요

prompt_adjustment:
- self_understanding
- cognitive_reframing
- reduce_self_pressure

important_memory:
- 결혼 후 자연임신에 성공했으나 유산을 경험했고 이후 여러 차례 시험관 시술을 진행했으나 자녀를 갖지 못함.
- 부모님이 2년 간격으로 돌아가신 뒤 남편을 만나 결혼했으며 이후 거주지를 옮겨 생활하게 됨.
- 과거 여러 직업을 거쳤으며 해외 유학과 관련 업계 근무 경험을 포함해 진로를 여러 차례 전환함.
- 대학원과 수련 과정을 거쳐 현재 상담 관련 분야에서 활동하고 있으며 전문성 향상을 중요한 목표로 두고 있음.
- 시댁에서 좋은 며느리 역할에 대한 부담을 오래 느껴왔으며 시누이 및 시부모와의 관계에서 위축감을 경험함.
main_complaint:
진로와 구직에 대한 불안, 의지 부족으로 인한 자기답답함

core_topics:
- 진로탐색
- 구직불안
- 자기효능감
- 상담동기와협력

next_session_notes:
구직 실패 경험이 형성한 미래에 대한 비관적 기대를 탐색하고 행동으로 이어지지 않는 이유와 의지 부족에 대한 인식을 구체적으로 확인할 필요

prompt_adjustment:
- motivation_building
- strength_identification
- career_exploration

important_memory:
- 계약직으로 근무 중이며 현재 계약 종료를 앞두고 있어 향후 구직과 진로 문제를 주요 고민으로 가지고 있음.
- 과거 여러 차례 구직 과정에서 불합격을 경험하며 채용 실패에 대한 부담과 불안을 반복적으로 겪음.
- 자신의 강점으로 성실성, 근무계약 준수, 꾸준한 근무 태도를 중요하게 여기며 채용 과정에서도 이를 강조해 왔음.
- 컴퓨터 관련 업무 경험이 있으며 PC 활용 능력에 자신이 있다고 인식하고 있음.
- 자격증 취득과 역량 개발의 필요성을 인식하고 있으나 실천이 잘 이루어지지 않는 점을 자신의 핵심 문제로 보고 있음.
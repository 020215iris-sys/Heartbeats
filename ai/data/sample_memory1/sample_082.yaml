main_complaint:
전 연인과의 관계에서 남은 감정이 현재 연애 관계의 불안과 분노로 이어지는 경험과 자신의 감정을 이해하고 표현하는 어려움

core_topics:
- 이별후감정
- 관계불안
- 감정인식
- 가족경험

next_session_notes:
감정조절을 배우고 싶다는 바람의 구체적 의미와 전 연인 관계에서 남아 있는 분노 억울함 불안의 원인 탐색 필요

prompt_adjustment:
- emotion_awareness
- relationship_exploration
- self_expression

important_memory:
- 대학 재학 중 번아웃으로 휴학한 뒤 복학하였으며 현재 학교에서 전 연인을 다시 마주하는 상황을 경험하고 있음.
- 전 연인과 교제 중 관계를 중단하거나 재고하자는 제안을 받은 경험이 있으며, 이별 후 감정을 충분히 정리하지 못한 채 생활을 이어감.
- 현재 새로운 연인과 교제 중이며, 전 연인과 관련된 불안 경험이 현재 관계에도 영향을 주고 있다고 느낌.
- 부모의 갈등으로 인해 어린 시절부터 아버지와 점차 떨어져 지냈으며, 고등학생 무렵 부모가 이혼함.
- 어린 시절 부모의 잦은 갈등을 경험했지만 가족을 힘들게 할까 봐 자신의 힘든 감정을 표현하지 않고 혼자 감당하는 방식에 익숙해짐.
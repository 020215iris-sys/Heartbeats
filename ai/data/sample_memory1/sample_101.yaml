main_complaint:
특별한 불안이나 초조함은 없으나, 가끔씩 긴장감이 느껴짐.
core_topics:
- 휴식과 회복
- 친구와의 관계
- 신앙과 영적 교류
- 사회적 관계의 중요성
- 호흡법과 이완
next_session_notes:
내담자가 친구와의 관계에서 느낀 감정과 신앙에 대한 대화를 더 깊이 탐구할 필요가 있음.
prompt_adjustment:
- 내담자의 긴장감과 이완 상태에 대한 구체적인 사례를 더 들어보자.
- 친구와의 관계에서 느끼는 감정의 변화에 대해 더 이야기해보자.
important_memory:
- @PLACE에서 교육을 받았고, 연휴 동안 많이 쉬었다.
- 친한 친구와 오랜만에 점심을 먹고 신앙에 대한 이야기를 나누었다.
- 친구와의 만남에서 서로의 경험과 비전을 나누며 기도 제목도 공유했다.
- 내담자는 3년 정도 @PLACE에 있을 계획이다.
main_complaint:
학교 관리자 역할에서 갈등 상황을 중재하고 구성원에게 부정적 피드백을 전달해야 할 때 큰 스트레스와 부담을 느끼며, 어려움을 겪는 학생·동료를 더 잘 이해하고 돕는 방법을 배우고 싶음

core_topics:
- 조직내갈등중재
- 관리자역할스트레스
- 학생과교사지원
- 상담역량향상

next_session_notes:
관리자 역할에서 갈등을 조정하고 부정적 피드백을 전달할 때 경험하는 부담감과 책임감을 구체적으로 탐색하고 갈등 상황에서의 사고 패턴 및 정서 반응, 대처 방식을 살펴볼 필요

prompt_adjustment:
- leadership_stress
- conflict_management
- helping_relationships

important_memory:
- 오랜 기간 교육 현장에서 근무했으며 현재 학교 관리자 역할을 수행하고 있음.
- 심리상담에 관심이 있어 석사 과정을 마친 후 다시 대학에 편입하여 상담 관련 공부를 하고 있음.
- 학생들의 정서적 어려움과 행동 문제의 이면에 있는 감정을 이해하고 돕고자 하는 동기를 가지고 있음.
- 배우자와 성인 아들 한 명이 있으며 아들은 서울에서 직장 생활을 하고 있음.
- 학교 내 갈등 상황에서 교사들 사이의 중재자 역할을 맡고 있으며 조직 운영과 구성원 관계 사이에서 균형을 맞추기 위해 노력하고 있음.
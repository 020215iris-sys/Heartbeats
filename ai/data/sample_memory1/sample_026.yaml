important_memory:
- 교회 내 남편과 함께 일했던 부부와의 트러블이 발생하였으며, 그 부인이 교회에서 남편에게 심한 막말을 쏟아냈고 이후 내담자는 해당 여자 집사와 마주쳤을 때 어떻게 대처해야 할지 고민 중이다.
- 내담자가 어린 시절 동생들을 창피해하며 따라오지 말라고 했던 행동을 최근 셋째 동생과의 대화를 통해 기억하게 되었고, 동생들에게 미안함을 느끼고 있다.
- 다음 주 셋째 동생 집 방문 시 어린 시절 동생들을 대했던 방식에 대해 이야기를 나눠보기로 계획하였다.
- 오늘 상담에서 능력과 가치를 혼동하고 있었음을 인식하였으며, 이 둘을 구분하는 것을 스스로의 과제로 삼았다.
- 다음 회기까지 자신이 현재 잘하고 있는 능력적인 부분이 무엇인지 찾아보기로 하였다.
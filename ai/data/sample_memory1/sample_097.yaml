- 이혼 이후 약 7년간 혼자 아들을 양육해 왔으며 경제적 부담과 양육 책임을 지속적으로 감당하고 있음.
- 이혼 초기 돌봄 비용 마련을 위해 주식 투자에 손을 댔다가 큰 손실과 빚을 경험함.
- 현재 빚 상환을 우선하고 있으며 내년쯤 채무를 모두 정리할 것으로 예상하고 있음.
- 이혼 이후 음주 빈도가 크게 증가했으며 현재도 주 3~4회 정도 혼자 술을 마시는 생활을 이어가고 있음.
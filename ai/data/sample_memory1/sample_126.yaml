main_complaint:
자신감 부족과 타인의 시선에 대한 불안
core_topics:
- 이직 경험
- 스트레스 상황
- 모친의 비판
- 자신감
- 사회적 평가
- 주의 집중 문제
next_session_notes:
내담자가 느끼는 불안과 자신감 부족에 대해 더 깊이 탐구할 필요가 있음.
prompt_adjustment:
- 내담자의 성공 경험을 더 강조할 필요가 있음.
- 모친의 비판이 내담자에게 미치는 영향에 대해 더 논의할 필요가 있음.
important_memory:
- 내담자는 5월에 @COMPANY에 이직함.
- 내담자는 새로운 프로그램을 주체적으로 진행한 경험이 있음.
- 내담자는 모친이 자신을 비교하며 비판하는 경험이 있음.
- 내담자는 직장에서 주의 집중이 떨어지는 문제를 겪고 있음.
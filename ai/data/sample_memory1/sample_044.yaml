main_complaint:
대인관계에서 무시당하거나 관계가 끊어질 것 같다는 느낌을 받을 때 강한 불안, 우울, 분노를 경험하며 부모와의 애정 결핍 경험이 현재 관계에 영향을 주는 것 같아 혼란스러움.

core_topics:
- 대인관계불안
- 애정욕구
- 부모관계
- 감정조절
- 자기이해

next_session_notes:
부모에게서 충족되지 못한 애정 욕구가 친구 및 연인 관계에 어떻게 투영되는지와 핵심 신념의 형성 과정을 탐색할 필요.

prompt_adjustment:
- attachment_exploration
- emotional_validation
- cognitive_restructuring

important_memory:
- 어린 시절 아버지와의 관계에서 무시당하고 상호작용이 부족하다고 느끼며 성장함.
- 부모와의 관계 악화, 친구 관계 단절, 연인 관계 종료가 겹쳤던 시기에 공황 증상을 경험함.
- 고등학생 시절에는 부모와 비슷한 모습을 보이는 친구들을 빠르게 단절하며 관계를 유지하지 못함.
- 현재는 인간관계에서 충동적으로 관계를 끊기보다 1~2년 이상 상대를 지켜본 뒤 관계를 정리하는 편임.
- 논문 연구실 활동을 시작했으며 최근 논문 회의 과정에서 강한 불안과 위축감을 경험함.
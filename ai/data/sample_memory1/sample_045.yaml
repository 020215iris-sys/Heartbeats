main_complaint:
직장 내 특정 상사로부터 반복적인 비난과 통제, 예측 불가능한 업무 지시를 경험하며 불안과 긴장, 과도한 대비 행동으로 인한 심리적 소진을 겪고 있음.

core_topics:
- 직장스트레스
- 불안
- 완벽주의
- 대인갈등
- 자기보호

next_session_notes:
직장 상사에 대한 불안과 완벽주의적 사고가 유지되는 과정 및 현실적인 자기보호 전략과 경계 설정 방식을 탐색할 필요.

prompt_adjustment:
- emotional_validation
- cognitive_restructuring
- stress_management

important_memory:
- 산후조리원에서 근무하며 특정 상사의 반복적인 비난과 통제적 행동으로 지속적인 스트레스를 경험하고 있음.
- 상사와 함께 근무하는 날이 다가오면 며칠 전부터 대응 방식을 반복적으로 시뮬레이션하며 불안이 높아짐.
- 직장 내 부당한 언행과 직장 내 괴롭힘으로 의심되는 사례들을 캡처 및 기록하며 증거를 수집하고 있음.
- 동료들과 상사의 부당한 행동에 대해 공감대를 형성하고 있으며 필요 시 함께 문제 제기를 하자는 이야기를 나누고 있음.
- 아이들을 돌보는 업무 자체에는 큰 보람과 애정을 느끼며 현재 직장을 계속 유지하고자 하는 의지가 있음.